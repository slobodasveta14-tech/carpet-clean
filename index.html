<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магия чистого ковра</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(180deg,#eef5fb,#f7fbff);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
  overflow-x:hidden;
}

.app{
  width:100%;
  max-width:820px;
  background:#fff;
  border-radius:28px;
  padding:22px;
  text-align:center;
  box-shadow:0 22px 60px rgba(20,70,120,.16);
  position:relative;
  overflow:hidden;
}

h1{
  color:#1477ff;
  font-size:34px;
  margin-bottom:8px;
}

.subtitle{
  font-size:18px;
  color:#111827;
  margin-bottom:14px;
}

.message{
  min-height:24px;
  font-size:17px;
  font-weight:700;
  color:#1477ff;
  margin-bottom:8px;
}

.progress-wrap{
  height:20px;
  background:#dfeaf5;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:18px;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#1477ff,#55c7ff);
  transition:width .18s ease;
}

.stage{
  position:relative;
  width:100%;
  border-radius:22px;
  overflow:hidden;
  background:#ddd;
  touch-action:none;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);
}

.stage img{
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

#canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  cursor:crosshair;
  touch-action:none;
}

.foam{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.92);
  pointer-events:none;
  animation:foam .9s ease-out forwards;
  box-shadow:0 0 16px rgba(255,255,255,.9);
}

@keyframes foam{
  0%{transform:scale(.35);opacity:.95}
  100%{transform:scale(1.8) translateY(-18px);opacity:0}
}

.finish{
  display:none;
  margin-top:18px;
  padding:22px;
  border-radius:22px;
  background:linear-gradient(180deg,#f3f8ff,#ffffff);
  border:1px solid #e4eefb;
}

.finish h2{
  color:#1477ff;
  font-size:28px;
  margin-bottom:8px;
}

.finish p{
  font-size:17px;
  color:#1f2937;
  line-height:1.45;
}

button{
  margin-top:14px;
  border:0;
  border-radius:16px;
  padding:16px 22px;
  font-size:17px;
  cursor:pointer;
  background:#1477ff;
  color:white;
  font-weight:bold;
  box-shadow:0 9px 20px rgba(20,119,255,.26);
}

button:active{transform:scale(.98)}

.secondary{
  background:#eaf1f8;
  color:#1b1b1b;
  box-shadow:none;
}

.hint{
  margin-top:12px;
  color:#64748b;
  font-size:14px;
}

.confetti{
  position:absolute;
  width:10px;
  height:16px;
  top:-20px;
  border-radius:3px;
  animation:fall 1.8s ease-in forwards;
  pointer-events:none;
}

@keyframes fall{
  to{
    transform:translateY(920px) rotate(620deg);
    opacity:0;
  }
}

@media(max-width:520px){
  .app{padding:16px;border-radius:20px}
  h1{font-size:25px}
  .subtitle{font-size:15px}
  button{width:100%;font-size:16px}
}
</style>
</head>

<body>

<div class="app" id="app">
  <h1>✨ Магия чистого ковра</h1>
  <p class="subtitle">Проведите пальцем по ковру и увидите настоящее преображение</p>

  <div class="message" id="message">🧼 Очищено: <span id="percent">0</span>%</div>

  <div class="progress-wrap">
    <div class="progress" id="progress"></div>
  </div>

  <div class="stage" id="stage">
    <img src="После.jpg" alt="Ковёр после чистки">
    <canvas id="canvas"></canvas>
  </div>

  <div class="finish" id="finish">
    <h2>🎉 Великолепно!</h2>
    <p>
      Представьте, что это был ваш ковёр.<br>
      Мы очистим настоящий профессионально, аккуратно и с заботой.
    </p>

    <button onclick="window.open('https://vk.me/ximchistkakovrov','_blank')">
      🚚 Записаться на чистку
    </button>

    <br>

    <button class="secondary" onclick="location.reload()">
      Очистить ещё раз
    </button>
  </div>

  <div class="hint">Лучше всего работает пальцем на телефоне 👆</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const stage = document.getElementById("stage");
const app = document.getElementById("app");
const percentText = document.getElementById("percent");
const progress = document.getElementById("progress");
const message = document.getElementById("message");
const finish = document.getElementById("finish");

const dirty = new Image();
dirty.src = "До.jpg";

let isDrawing = false;
let cleanedPoints = new Set();
let finished = false;
let lastFoam = 0;
let shown25 = false;
let shown50 = false;
let shown75 = false;

function resizeCanvas(){
  const rect = stage.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  if(dirty.complete){
    ctx.globalCompositeOperation = "source-over";
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(dirty,0,0,canvas.width,canvas.height);
  }
}

dirty.onload = resizeCanvas;
window.addEventListener("resize", resizeCanvas);

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  let clientX, clientY;

  if(e.touches && e.touches.length){
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  }else{
    clientX = e.clientX;
    clientY = e.clientY;
  }

  return {
    x: clientX - rect.left,
    y: clientY - rect.top
  };
}

function makeSoftBrush(x,y){
  const brush = canvas.width * 0.095;

  const gradient = ctx.createRadialGradient(x,y,brush*.12,x,y,brush);
  gradient.addColorStop(0,"rgba(0,0,0,1)");
  gradient.addColorStop(.60,"rgba(0,0,0,.72)");
  gradient.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation = "destination-out";
  ctx.fillStyle = gradient;

  ctx.beginPath();
  ctx.ellipse(x,y,brush*1.25,brush*.75,0,0,Math.PI*2);
  ctx.fill();

  ctx.globalCompositeOperation = "source-over";
}

function addFoam(x,y){
  const now = Date.now();
  if(now - lastFoam < 60) return;
  lastFoam = now;

  const appRect = app.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();

  for(let i=0;i<5;i++){
    const dot = document.createElement("div");
    dot.className = "foam";

    const size = 8 + Math.random()*20;
    dot.style.width = size + "px";
    dot.style.height = size + "px";

    dot.style.left = (x + stageRect.left - appRect.left + (Math.random()*58-29)) + "px";
    dot.style.top = (y + stageRect.top - appRect.top + (Math.random()*50-25)) + "px";

    app.appendChild(dot);
    setTimeout(()=>dot.remove(),900);
  }
}

function updateProgress(x,y){
  const cell = 34;
  const cx = Math.floor(x/cell);
  const cy = Math.floor(y/cell);

  for(let dx=-1;dx<=1;dx++){
    for(let dy=-1;dy<=1;dy++){
      cleanedPoints.add((cx+dx)+"-"+(cy+dy));
    }
  }

  const totalCells = Math.ceil(canvas.width/cell) * Math.ceil(canvas.height/cell);
  let percent = Math.min(100, Math.floor((cleanedPoints.size / totalCells) * 135));

  percentText.textContent = percent;
  progress.style.width = percent + "%";

  if(percent >= 25 && !shown25){
    shown25 = true;
    message.innerHTML = "✨ Уже видно настоящий цвет ковра — <span id='percent'>" + percent + "</span>%";
  }

  if(percent >= 50 && !shown50){
    shown50 = true;
    message.innerHTML = "🧼 Половина пути! Пятна уходят — <span id='percent'>" + percent + "</span>%";
  }

  if(percent >= 75 && !shown75){
    shown75 = true;
    message.innerHTML = "💎 Почти готово! Ковёр заметно свежее — <span id='percent'>" + percent + "</span>%";
  }

  if(percent < 25){
    message.innerHTML = "🧼 Очищено: <span id='percent'>" + percent + "</span>%";
  }

  if(percent >= 100 && !finished){
    complete();
  }
}

function clean(e){
  if(!isDrawing || finished) return;
  e.preventDefault();

  const {x,y} = getPos(e);

  makeSoftBrush(x,y);
  addFoam(x,y);
  updateProgress(x,y);
}

function complete(){
  finished = true;
  message.innerHTML = "🏆 Очищено: <span id='percent'>100</span>%";
  progress.style.width = "100%";
  finish.style.display = "block";
  confetti();

  setTimeout(()=>{
    finish.scrollIntoView({behavior:"smooth", block:"nearest"});
  },250);
}

function confetti(){
  const colors = ["#1477ff","#57b6ff","#ffd166","#ef476f","#06d6a0"];
  for(let i=0;i<80;i++){
    const piece = document.createElement("div");
    piece.className = "confetti";
    piece.style.left = Math.random()*100 + "%";
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDelay = Math.random()*0.7 + "s";
    piece.style.animationDuration = (1.2 + Math.random()*1.4) + "s";
    app.appendChild(piece);
    setTimeout(()=>piece.remove(),2600);
  }
}

canvas.addEventListener("mousedown", e => {isDrawing=true; clean(e)});
canvas.addEventListener("mousemove", clean);
canvas.addEventListener("mouseup", () => isDrawing=false);
canvas.addEventListener("mouseleave", () => isDrawing=false);

canvas.addEventListener("touchstart", e => {isDrawing=true; clean(e)}, {passive:false});
canvas.addEventListener("touchmove", clean, {passive:false});
canvas.addEventListener("touchend", () => isDrawing=false);
</script>

</body>
</html>
