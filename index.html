<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Магия чистого ковра</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" id="app">
    <h1>✨ Магия чистого ковра</h1>
    <p class="subtitle">Проведите пальцем по ковру — как будто работает экстрактор</p>

    <div class="status" id="status">🧼 Очищено: <span id="percent">0</span>%</div>
    <div class="progress-wrap"><div class="progress" id="progress"></div></div>

    <section class="stage" id="stage">
      <img src="После.jpg" alt="Ковёр после чистки">
      <canvas id="canvas"></canvas>
      <div class="extractor" id="extractor">💦</div>
    </section>

    <section class="finish" id="finish">
      <h2>🎉 Великолепно!</h2>
      <p>Представьте, что это был ваш ковёр. Мы очистим настоящий профессионально, аккуратно и с заботой.</p>
      <button onclick="window.open('https://vk.com/club225727068','_blank')">💬 Записаться на чистку</button>
      <button class="secondary" onclick="location.reload()">Очистить ещё раз</button>
    </section>

    <p class="hint">Лучше всего работает пальцем на телефоне 👆</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
