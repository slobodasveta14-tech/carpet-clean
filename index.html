<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магия чистого ковра</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:#eef5fb;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
}

.app{
  width:100%;
  max-width:820px;
  background:white;
  border-radius:26px;
  padding:22px;
  text-align:center;
  box-shadow:0 20px 55px rgba(20,70,120,.16);
  position:relative;
  overflow:hidden;
}

h1{color:#1477ff;font-size:34px;margin-bottom:8px}
.subtitle{font-size:18px;margin-bottom:14px}
.status{font-size:18px;font-weight:bold;color:#1477ff;margin-bottom:8px}

.progress-wrap{
  height:20px;
  background:#dfeaf5;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:18px;
}

.progress{
  height:100%;
  width:0%;
  background:#1477ff;
  transition:.2s;
}

.stage{
  position:relative;
  width:100%;
  border-radius:22px;
  overflow:hidden;
  background:#ddd;
  touch-action:none;
}

.stage img{
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  touch-action:none;
  cursor:crosshair;
}

.brush{
  position:absolute;
  width:74px;
  height:74px;
  display:none;
  pointer-events:none;
  z-index:5;
  transform:translate(-50%,-50%) rotate(-18deg);
}

.brush-body{
  position:absolute;
  width:58px;
  height:38px;
  background:linear-gradient(135deg,#1684ff,#004fc4);
  border-radius:14px;
  left:8px;
  top:10px;
  box-shadow:0 8px 18px rgba(0,0,0,.25);
}

.brush-handle{
  position:absolute;
  width:18px;
  height:48px;
  background:linear-gradient(180deg,#ffffff,#d7e9ff);
  border-radius:10px;
  left:28px;
  top:0;
  box-shadow:inset 0 0 0 2px rgba(20,119,255,.25);
}

.brush-bristles{
  position:absolute;
  left:12px;
  top:45px;
  width:50px;
  height:18px;
  display:flex;
  justify-content:space-between;
}

.brush-bristles span{
  width:5px;
  height:18px;
  background:#ffffff;
  border-radius:99px;
  box-shadow:0 0 8px rgba(255,255,255,.9);
}

.foam{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.92);
  pointer-events:none;
  animation:foam .8s ease-out forwards;
  box-shadow:0 0 12px rgba(255,255,255,.9);
}

@keyframes foam{
  to{transform:scale(2) translateY(-15px);opacity:0}
}

.finish{
  display:none;
  margin-top:18px;
  padding:22px;
  border-radius:20px;
  background:#f3f8ff;
}

.finish h2{color:#1477ff;margin-bottom:8px}

button{
  margin-top:14px;
  border:0;
  border-radius:16px;
  padding:16px 22px;
  font-size:17px;
  background:#1477ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.secondary{background:#eaf1f8;color:#111}

</style>
</head>

<body>

<div class="app" id="app">
  <h1>✨ Магия чистого ковра</h1>
  <p class="subtitle">Проведите пальцем по ковру и очистите его полностью</p>

  <div class="status">🧼 Очищено: <span id="percent">0</span>%</div>
  <div class="progress-wrap"><div class="progress" id="progress"></div></div>

  <div class="stage" id="stage">
    <img src="После.jpg" alt="Ковёр после чистки">
    <canvas id="canvas"></canvas>

    <div class="brush" id="brush">
      <div class="brush-handle"></div>
      <div class="brush-body"></div>
      <div class="brush-bristles">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="finish" id="finish">
    <h2>🎉 Ковёр очищен!</h2>
    <p>Хотите такой же результат для своего ковра?</p>
    <button onclick="window.open('https://vk.com/club225727068','_blank')">💬 Записаться на чистку</button>
    <br>
    <button class="secondary" onclick="location.reload()">Очистить ещё раз</button>
  </div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const stage=document.getElementById("stage");
const app=document.getElementById("app");
const brushEl=document.getElementById("brush");
const percentText=document.getElementById("percent");
const progress=document.getElementById("progress");
const finish=document.getElementById("finish");

const dirty=new Image();
dirty.src="До.jpg";

let drawing=false;
let finished=false;
let cleaned=new Set();
const cell=22;

function resizeCanvas(){
  const r=stage.getBoundingClientRect();
  canvas.width=r.width;
  canvas.height=r.height;

  ctx.globalCompositeOperation="source-over";
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(dirty,0,0,canvas.width,canvas.height);
}

dirty.onload=resizeCanvas;
window.addEventListener("resize",resizeCanvas);

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches ? e.touches[0] : e;
  return {x:p.clientX-r.left,y:p.clientY-r.top};
}

function clean(x,y){
  const brushSize=canvas.width*0.14;

  const g=ctx.createRadialGradient(x,y,brushSize*0.1,x,y,brushSize);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(0.7,"rgba(0,0,0,.9)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,brushSize,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";

  markCleaned(x,y,brushSize);
  makeFoam(x,y);
}

function markCleaned(x,y,brushSize){
  const cols=Math.ceil(canvas.width/cell);
  const rows=Math.ceil(canvas.height/cell);

  const minX=Math.max(0,Math.floor((x-brushSize)/cell));
  const maxX=Math.min(cols-1,Math.floor((x+brushSize)/cell));
  const minY=Math.max(0,Math.floor((y-brushSize)/cell));
  const maxY=Math.min(rows-1,Math.floor((y+brushSize)/cell));

  for(let gy=minY;gy<=maxY;gy++){
    for(let gx=minX;gx<=maxX;gx++){
      const cx=gx*cell+cell/2;
      const cy=gy*cell+cell/2;
      if(Math.hypot(cx-x,cy-y)<brushSize){
        cleaned.add(gx+"-"+gy);
      }
    }
  }

  const total=cols*rows;
  let percent=Math.floor((cleaned.size/total)*100);

  if(percent>=85){
    finishCleaning();
    return;
  }

  percentText.textContent=percent;
  progress.style.width=percent+"%";
}

function finishCleaning(){
  if(finished)return;
  finished=true;

  ctx.globalCompositeOperation="destination-out";
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.globalCompositeOperation="source-over";

  percentText.textContent="100";
  progress.style.width="100%";
  finish.style.display="block";
  brushEl.style.display="none";

  finish.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function makeFoam(x,y){
  const ar=app.getBoundingClientRect();
  const sr=stage.getBoundingClientRect();

  for(let i=0;i<5;i++){
    const f=document.createElement("div");
    f.className="foam";
    const s=8+Math.random()*18;
    f.style.width=s+"px";
    f.style.height=s+"px";
    f.style.left=(x+sr.left-ar.left+Math.random()*55-27)+"px";
    f.style.top=(y+sr.top-ar.top+Math.random()*55-27)+"px";
    app.appendChild(f);
    setTimeout(()=>f.remove(),800);
  }
}

function moveBrush(x,y){
  brushEl.style.display="block";
  brushEl.style.left=x+"px";
  brushEl.style.top=y+"px";
  brushEl.style.transform="translate(-50%,-50%) rotate("+(-18+Math.sin(Date.now()/120)*8)+"deg)";
}

function move(e){
  if(!drawing||finished)return;
  e.preventDefault();

  const p=getPos(e);
  clean(p.x,p.y);
  moveBrush(p.x,p.y);
}

canvas.addEventListener("mousedown",e=>{drawing=true;move(e)});
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",()=>{drawing=false;brushEl.style.display="none"});
canvas.addEventListener("mouseleave",()=>{drawing=false;brushEl.style.display="none"});

canvas.addEventListener("touchstart",e=>{drawing=true;move(e)},{passive:false});
canvas.addEventListener("touchmove",move,{passive:false});
canvas.addEventListener("touchend",()=>{drawing=false;brushEl.style.display="none"});
</script>

</body>
</html>
