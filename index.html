<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Магия чистого ковра</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#eef2f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
text-align:center;
width:90%;
max-width:700px;
}

h1{
color:#1976ff;
margin-bottom:10px;
}

p{
margin-bottom:20px;
font-size:18px;
}

canvas{
width:100%;
max-width:600px;
border-radius:15px;
cursor:pointer;
touch-action:none;
}

button{
margin-top:25px;
padding:15px 30px;
border:none;
background:#1976ff;
color:white;
font-size:20px;
border-radius:12px;
cursor:pointer;
display:none;
}

button:hover{
background:#0b5fe0;
}

</style>

</head>

<body>

<div class="card">

<h1>🧼 Очистите ковёр</h1>

<p>Проведите пальцем или мышкой по ковру.</p>

<canvas id="canvas" width="600" height="400"></canvas>

<button id="btn">
Заказать профессиональную чистку
</button>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const btn=document.getElementById("btn");

const img=new Image();

img.crossOrigin="anonymous";

img.src="https://images.unsplash.com/photo-1517705008128-361805f42e86?w=1200";

img.onload=function(){

ctx.drawImage(img,0,0,600,400);

ctx.fillStyle="rgba(90,60,30,0.75)";
ctx.fillRect(0,0,600,400);

}

let cleaned=0;

function clean(x,y){

ctx.save();

ctx.globalCompositeOperation="destination-out";

ctx.beginPath();

ctx.arc(x,y,35,0,Math.PI*2);

ctx.fill();

ctx.restore();

cleaned++;

if(cleaned>180){

btn.style.display="inline-block";

}

}

let drawing=false;

canvas.addEventListener("mousedown",()=>drawing=true);

canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("mouseleave",()=>drawing=false);

canvas.addEventListener("mousemove",(e)=>{

if(!drawing)return;

const r=canvas.getBoundingClientRect();

clean(e.clientX-r.left,e.clientY-r.top);

});

canvas.addEventListener("touchmove",(e)=>{

e.preventDefault();

const r=canvas.getBoundingClientRect();

const t=e.touches[0];

clean(t.clientX-r.left,t.clientY-r.top);

});

btn.onclick=function(){

window.open("https://vk.com/ximchistkakovrov","_blank");

}

</script>

</body>
</html>
