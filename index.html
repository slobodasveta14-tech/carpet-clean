<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чистка ковров</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    width:90%;
    max-width:500px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
    text-align:center;
}

h1{
    color:#0077ff;
}

button{
    background:#0077ff;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#005ed1;
}
</style>

</head>

<body>

<div class="card">

<h1>🧼 Чистка ковров</h1>

<p>
Добро пожаловать в наше приложение.
</p>

<p>
Совсем скоро здесь появится интерактивный ковёр, который можно будет очистить одним движением пальца.
</p>

<button onclick="alert('Работает! 🎉')">
Проверить приложение
</button>

</div>

</body>
</html>
